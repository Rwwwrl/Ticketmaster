name: Deploy Container Service to ECS

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.DEPLOYER_TO_AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
        run: |
          IMAGE=$REGISTRY/${{ inputs.service_name }}:${{ github.sha }}
          docker build -t $IMAGE ${{ inputs.service_path }}
          docker push $IMAGE

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --stack-name ${{ inputs.service_name }}-${{ inputs.environment }} \
            --template-file ${{ inputs.service_path }}/service.yaml \
            --parameter-overrides \
                ImageTag=${{ github.sha }} \
                Environment=${{ inputs.environment }} \
                ExecutionRoleArn=${{ vars.ECS_EXECUTION_ROLE_ARN }} \
                InfrastructureRoleArn=${{ vars.ECS_INFRASTRUCTURE_ROLE_ARN }} \
            --no-fail-on-empty-changeset \
            --region ${{ vars.AWS_REGION }}
